<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#0a0e0a"/>

  <!-- faint code columns, background -->
  <g font-family="Menlo, Consolas, monospace" font-size="13" fill="#1f9d55" opacity="0.45">
    <text x="60" y="25">import flask</text>
    <text x="60" y="270">git commit -m "feat"</text>
    <text x="980" y="25">SELECT * FROM users</text>
    <text x="980" y="45">JOIN posts ON id=fk</text>
    <text x="980" y="270">npm run dev</text>
    <text x="980" y="250">useState()</text>
    <text x="60" y="45">class Node:</text>
    <text x="60" y="65">  self.next = None</text>
  </g>

  <!-- terminal window, centered -->
  <rect x="150" y="45" width="900" height="210" rx="10" fill="#0d1512" stroke="#1f9d55" stroke-width="1.5"/>
  <rect x="150" y="45" width="900" height="32" rx="10" fill="#132218"/>
  <circle cx="175" cy="61" r="6" fill="#ff5f56"/>
  <circle cx="196" cy="61" r="6" fill="#ffbd2e"/>
  <circle cx="217" cy="61" r="6" fill="#27c93f"/>
  <text x="330" y="66" font-family="Menlo, Consolas, monospace" font-size="13" fill="#5c8f6a">david@github: ~</text>

  <text x="185" y="115" font-family="Menlo, Consolas, monospace" font-size="17" fill="#27c93f">$ whoami</text>
  <text x="185" y="150" font-family="Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="#eafff0">David Duque Vélez</text>
  <text x="185" y="180" font-family="Menlo, Consolas, monospace" font-size="16" fill="#8fd9a8">Estudiante de Ing. de Sistemas · Full Stack Developer</text>
  <text x="185" y="212" font-family="Menlo, Consolas, monospace" font-size="14" fill="#5c8f6a">$ echo "Bienvenido a mi perfil"</text>
  <text x="185" y="234" font-family="Menlo, Consolas, monospace" font-size="14" fill="#c8f5d6">Bienvenido a mi perfil</text>

  <!-- blinking cursor -->
  <rect x="378" y="222" width="9" height="16" fill="#27c93f">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
